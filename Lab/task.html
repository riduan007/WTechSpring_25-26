<!DOCTYPE html>
<html lang="eng">
<head>
    <title>Student Registration Page</title>
</head>
<body>
    <h1>Student Registration Page</h1>

<form>
        <label for = "StudentName">Student Name: </label>
        <input type = "text" id = "StudentName" name = "StudentName" placeholder = "Enter Your Name">
        <br><br>

        <label for = "CGPA">Student CGPA:</label>
        <input type ="text" id = "CGPA" name = "CGPA" placeholder = "Enter Your CGPA">
        <br><br>

        <label for = "GenderMale">Male</label>
        <input type = "radio" id = "GenderMale" name = "Gender" value = "Male">
        <br><br>
        <label for = "GenderFemale">Female</label>
        <input type = "radio" id = "GenderFemale" name = "Gender" value = "Female">
        <br><br>

        <label for = "Dept">Select Department:</label>
        <select>
            <option value = "Default"></option>
            <option value = "CSE">CSE</option>
            <option value = "EEE">EEE</option>
            <option value = "BBA">BBA</option>
            <option value = "COA">COA</option>
        </select>
        <br><br>

        <label for = "StudentID">Student ID</label>
        <input type = "text" id="StudentID" name = "StudentID">
        <br><br>

        <label for = "Address">Address</label>
        <textarea id = "Address" name = "Address" rows = "4" cols = "40" placeholder = "Enter your address here"></textarea>
        <br><br>

        <label for = "DOB">Date of Birth</label>
        <input type = "date" id = "DOB" name = "DOB">
        <br><br>

        <label for = "Email">Email:</label>
        <input type = "email" id = "Email" name = "Email" placeholder = "Enter your email">
        <br><br>

        <label for = "GradeReport">Upload your Grade Report: </label>
        <input type = "file" id = "GradeReport" name = "GradeReport">
        <br><br>

        <label for = "Terms">I agree to the terms and conditions</label>
        <input type = "checkbox" id = "Terms" name = "Terms">
        <br><br>

        <label for = "Phone">Phone Number: </label>
        <input type = "tel" id = "Phone" name = "Phone" placeholder = "Enter your phone number">
        <br><br>

        <p>Submit your information</p>
        <input type = "submit" value = "Submit">
    </form>
</body>
</html>
